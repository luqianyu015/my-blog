<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/messagecss.css">
</head>
<body>
    <div class="message-card">
        <h2>💬 留言板</h2>
        <form id="messageForm">
            <input type="text" id="name" placeholder="请输入你的名字">
            <input type="text" id="contact" placeholder="请输入你的联系方式">
            <textarea id="content" rows="5" placeholder="请输入你的留言"></textarea>
            <button type="submit">提交留言</button>
        </form>
    </div>

    <script src="../js/message.js"></script>
</body>
</html>
