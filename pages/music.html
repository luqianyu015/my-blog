<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的专属音乐空间</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }

        body {
            color: #e0e0e0;
            padding: 15px;
            font-size: 12px;
            line-height: 1.3;
        }

        .music-section {
            margin: 50px;
            background-color: #e0e0e011;
            padding: 20px;
            border-radius: 30px;
        }

        .section-title {
            font-size: 20px;
            color: #ffffffc9;
            margin-bottom: 8px;
            padding-left: 5px;
        }

        .singer-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 30px;
        }

        .singer-box {
            background: #d2d2d267;
            border-radius: 25px;
            padding: 12px;
            margin: 30px;
            transition: 0.2s;
            cursor: pointer;
            width: 200px;
        }

        .singer-box:hover {
            background: #71717181;
            transform: scale(1.02);
        }

        .singer-img {
            width: 100%;
            height: auto;
            object-fit: cover;
            border-radius: 20px;
            margin-bottom: 5px;
        }

        .singer-name {
            text-align: center;
            font-size: 12px;
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .song-list {
            width: 100%;
            max-height: 140px;
            overflow-y: auto;
            background: #f4f4f48a;
            color: #000000;
            border-radius: 10px;
            font-size: 11px;
            padding: 5px;
            margin-top: 5px;
            list-style: none;
        }

        .song-item {
            padding: 4px;
            cursor: pointer;
        }

        .song-item:hover {
            background: #444;
            border-radius: 10px;
        }

        .audio-player {
            width: 80%;
            height: 28px;
            margin-top: 4px;
            display: none;
        }

        .player-container {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 90%;
            padding: 8px;
            z-index: 999;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-left: 5%;
            opacity: 0.6;
        }

        #global-player {
            width: 100%;
            height: 30px;
        }

        /* 全局美化滚动条 */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        ::-webkit-scrollbar-track {
            background: #252525;
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb {
            background: #65656582;
            border-radius: 3px;
            transition: 0.3s;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #3c97b1;
        }

    </style>
</head>

<body style="background-image: url('../image/background.png'); background-size: cover; background-attachment: fixed;">

        function renderSingers(containerId, singers) {
            const container = document.getElementById(containerId);
            singers.forEach(singer => {
                const box = document.createElement('div');
                box.className = 'singer-box';

                let list = '';
                singer.songs.forEach((song, index) => {
                    list += `<li class="song-item" onclick="playSong2('${song.url}')">${index + 1}. ${song.name}</li>`;
                });

                box.innerHTML = `
                    <img src="${singer.img}" alt="${singer.name}" class="singer-img">
                    <div class="singer-name">${singer.name}</div>
                    <ul class="song-list">${list}</ul>
                `;
                container.appendChild(box);
            });
        }

        function playSong2(url) {
            if (url) {
                player.src = url;
                player.play();
            }
        }

        renderSingers('chinese-singers', chineseSingers);
        renderSingers('foreign-singers', foreignSingers);
